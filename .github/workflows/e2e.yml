name: Functional and static suite

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Functional and E2E suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Run static and functional suite
        shell: bash
        env:
          WATCHVERSE_RUN_E2E: '0'
          WATCHVERSE_USE_SYSTEM_BROWSER: '0'
        run: |
          npm test

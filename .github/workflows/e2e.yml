name: End-to-end tests

on:
  workflow_dispatch:
    inputs:
      run_browser_e2e:
        description: 'Esegui anche i test E2E con Chromium'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  e2e:
    name: Functional and E2E suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: ${{ inputs.run_browser_e2e == true }}
        run: npx --yes playwright@1.61.1 install chromium

      - name: Run suite
        shell: bash
        env:
          WATCHVERSE_RUN_E2E: ${{ inputs.run_browser_e2e && '1' || '0' }}
        run: |
          if [ "${WATCHVERSE_RUN_E2E}" = "1" ]; then
            export CHROME_PATH="$(find "$HOME/.cache/ms-playwright" -type f \( -name chrome -o -name chromium -o -name headless_shell \) -perm -111 | head -n 1)"
          fi
          echo "Chromium: ${CHROME_PATH:-Playwright default}"
          npm test
